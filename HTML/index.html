<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cafe 02</title>
  <!-- Estilo -->
  <link rel="stylesheet" href="../CSS/style.css" />
  <!--           Estilo -->

  <!-- Fontes -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet" />
</head>

<body>
  <!-- <header class="container"> -->
    <header>
    <img src="../assets/Graphics/Logo.svg" alt="Logo Café" />
    <div class="div-header-right">
      <div class="local">
        <img src="../assets/Icones/map_pin.svg" alt="Pino para Mapa" />
        <span>Fortaleza, Ce</span>
      </div>

      <button class="btn-cart">
        <img src="../Assets/Icones/carrinho_amarelo.svg" alt="carrinho de compras" />
      </button>
    </div>
  </header>
  <main>
    <section class="section-banner">
      <div class="div-banner">
        <h1>Encontre o café perfeito para qualquer hora do dia</h1>
        <p>Com o Coffee Delivery você recebe seu café onde estiver, a qualquer hora</p>

        <div>
          <ul class="div-banner-vantagens">
            <li class="lista_vantagem"><img src="../Assets/Icones/carrinho_branco.svg" alt="Icone de carrinho de compra" class="circulo_imagem ouro" />Compra simples e
              segura</li>
            <li class="lista_vantagem"><img src="../Assets/Icones/embalagem.svg" alt="Icone de embalagem" class="circulo_imagem cinza"/>Embalagem mantém o café intacto
            </li>
            <li class="lista_vantagem"><img src="../Assets/Icones/temporizador.svg" alt="Icone de Relógio" class="circulo_imagem amarelo"/>Entrega rápida e rastreada</li>
            <li class="lista_vantagem"><img src="../Assets/Icones/cafezinho.svg" alt="Icone de Relógio" class="circulo_imagem roxo"/>O café chega fresquinho até você</li>
          </ul>
        </div>
      </div>
      <img src="../Assets/Graphics/copo_cafe.svg" alt="Copo de Café com grão em volta" />
    </section>

    <secion class="menu">
      
    </secion>

  </main>
</body>

</html>
